# Build desktop installers (Windows .exe, Linux .deb, macOS .dmg) on demand.
# Run manually via "Run workflow" or on version tags to produce artifacts and (on tag) create a GitHub Release for auto-updates.
# Signing/notarization: commented out until ready; see docs/reference/desktop-build-and-distribution.md.

name: Desktop installers

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: read

# Signing env (macOS commented out until ready; Windows active when secrets are set)
# env:
#   APPLE_ID: ${{ secrets.APPLE_ID }}
#   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
#   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
#   APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
#   APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
#   APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
env:
  WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
  WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dossier-linux
          - os: windows-latest
            artifact_name: dossier-windows
          - os: macos-latest
            artifact_name: dossier-macos

    runs-on: ${{ matrix.os }}

    # Windows runner needs bash so postbuild (cp -r) works
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Linux deps (deb maker)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Signing steps
      # - name: Prepare Apple API key for notarization
      #   if: matrix.os == 'macos-latest' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_KEY_BASE64 != ''
      #   run: |
      #     echo "$APPLE_API_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/AppleApiKey.p8"
      #     echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AppleApiKey.p8" >> $GITHUB_ENV
      - name: Create Windows PFX for signing
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE_PFX_BASE64 != ''
        run: |
          echo "$WINDOWS_CERTIFICATE_PFX_BASE64" | base64 -d > cert.pfx
          chmod 600 cert.pfx

      - name: Build desktop installers
        env:
          # Windows: more heap (GITHUB_ENV blocks NODE_OPTIONS, so set per-step)
          NODE_OPTIONS: ${{ matrix.os == 'windows-latest' && '--max-old-space-size=4096' || '' }}
        run: pnpm run electron:make

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.version }}
          path: out/make/
          if-no-files-found: error

  # Create GitHub Release with all three installers (enables auto-update via update.electronjs.org)
  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: dossier-windows-${{ steps.tag.outputs.version }}

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: dossier-linux-${{ steps.tag.outputs.version }}

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: dossier-macos-${{ steps.tag.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Dossier ${{ steps.tag.outputs.version }}
          draft: false
          files: |
            dossier-windows-${{ steps.tag.outputs.version }}/*
            dossier-linux-${{ steps.tag.outputs.version }}/*
            dossier-macos-${{ steps.tag.outputs.version }}/*
          generate_release_notes: true
