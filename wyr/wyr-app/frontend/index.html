<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossier Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .splash {
      text-align: center;
    }
    .splash h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .splash p {
      color: #888;
      font-size: 0.95rem;
    }
    .spinner {
      margin: 1.5rem auto;
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <h1>DOSSIER</h1>
    <div class="spinner"></div>
    <p>Starting application server&hellip;</p>
  </div>
</body>
</html>
